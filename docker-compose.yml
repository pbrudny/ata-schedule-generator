services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ata_schedule
      POSTGRES_USER: ata
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ata -d ata_schedule"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://ata:${DB_PASSWORD:-changeme}@db:5432/ata_schedule
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
